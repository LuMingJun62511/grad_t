# Demo workflow config for wf-runner
# TASK: defines a new task group
# RETRIES: per-task retry override (default: 3)
# DELAY: per-task retry delay in seconds (default: 5)

TASK: data_preprocessing
RETRIES: 2
DELAY: 1
./test/test_ok.sh
./test/test_sleep.sh

TASK: model_training
RETRIES: 2
DELAY: 1
./test/test_flaky.sh
./test/test_ok.sh
./test/test_sleep.sh

TASK: model_evaluation
RETRIES: 2
DELAY: 1
./test/test_fail.sh
./test/test_ok.sh

TASK: deploy
./test/test_ok.sh
./test/test_sleep.sh
